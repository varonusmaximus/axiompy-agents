# Code Review Agent - CI/CD
#
# Required for push to GHCR: packages:write on GITHUB_TOKEN (default for GITHUB_TOKEN on push).

name: Code Review Agent CI/CD

on:
  push:
    branches: [main]
    paths:
      - "axiompy/agents/code_review/**"
      - ".github/workflows/code-review-agent-deploy.yml"

  pull_request:
    branches: [main]
    paths:
      - "axiompy/agents/code_review/**"

  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/code-review-agent

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test-all]"

      - name: Run code review agent tests
        run: |
          cd axiompy/agents/code_review
          make ci-test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.14.14

      - name: Run ruff
        run: |
          ruff check axiompy/agents/code_review/
          ruff format --check axiompy/agents/code_review/

  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: axiompy/agents/code_review/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [test, lint, build]
    if: failure()
    steps:
      - name: Summary
        run: |
          echo "## Pipeline failed" >> "$GITHUB_STEP_SUMMARY"
          echo "See workflow logs for details." >> "$GITHUB_STEP_SUMMARY"
